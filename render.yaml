services:
  - type: web
    name: realestate-dashboard
    env: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: gunicorn dashboard_advanced:server --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 180 --access-logfile -
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.7
